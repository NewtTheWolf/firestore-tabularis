name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.platform-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform-label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: zip
            binary-suffix: ""
          - platform-label: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: zip
            binary-suffix: ""
            cross: true
          - platform-label: darwin-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            archive: zip
            binary-suffix: ""
          - platform-label: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: zip
            binary-suffix: ""
          - platform-label: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary-suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Check for UI extension
        id: ui
        shell: bash
        run: |
          if [ -f ui/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.ui.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        if: steps.ui.outputs.present == 'true'
        shell: bash
        working-directory: ui
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install cross (linux-arm64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          STAGE=staging
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/firestore-plugin${{ matrix.binary-suffix }} "$STAGE/"
          cp manifest.json "$STAGE/"
          if [ -f ui/dist/index.js ]; then
            mkdir -p "$STAGE/ui/dist"
            cp ui/dist/index.js "$STAGE/ui/dist/"
          fi
          (cd "$STAGE" && zip -r ../firestore-plugin-${{ matrix.platform-label }}.zip .)

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\firestore-plugin${{ matrix.binary-suffix }}" $stage
          Copy-Item "manifest.json" $stage
          if (Test-Path "ui\dist\index.js") {
            New-Item -ItemType Directory -Force -Path "$stage\ui\dist" | Out-Null
            Copy-Item "ui\dist\index.js" "$stage\ui\dist"
          }
          Compress-Archive -Path "$stage\*" -DestinationPath "firestore-plugin-${{ matrix.platform-label }}.zip"

      - name: Stash artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-plugin-${{ matrix.platform-label }}
          path: firestore-plugin-${{ matrix.platform-label }}.zip
          retention-days: 1

  release:
    name: Publish release on Codeberg
    needs: build
    runs-on: ubuntu-latest
    env:
      CODEBERG_OWNER: NewtTheWolf
      CODEBERG_REPO: firestore-tabularis
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or fetch Codeberg release
        id: release
        env:
          TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::CODEBERG_TOKEN secret is required for releasing to Codeberg"
            exit 1
          fi
          API="https://codeberg.org/api/v1/repos/${CODEBERG_OWNER}/${CODEBERG_REPO}"
          AUTH="Authorization: token ${TOKEN}"

          existing=$(curl -fsS -H "$AUTH" "${API}/releases/tags/${TAG}" 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            id=$(echo "$existing" | jq -r .id)
            echo "Found existing release id=$id"
          else
            is_pre=false
            case "$TAG" in *-*) is_pre=true ;; esac
            body=$(jq -n --arg tag "$TAG" --argjson pre "$is_pre" '{
              tag_name: $tag, name: $tag,
              body: "Automated build from GitHub Actions.",
              draft: false, prerelease: $pre
            }')
            resp=$(curl -fsS -X POST -H "$AUTH" -H "Content-Type: application/json" -d "$body" "${API}/releases")
            id=$(echo "$resp" | jq -r .id)
            echo "Created release id=$id"
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Upload assets to Codeberg
        env:
          TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          REL_ID: ${{ steps.release.outputs.id }}
        run: |
          set -euo pipefail
          API="https://codeberg.org/api/v1/repos/${CODEBERG_OWNER}/${CODEBERG_REPO}"
          AUTH="Authorization: token ${TOKEN}"
          for f in artifacts/*.zip; do
            name=$(basename "$f")
            echo "Uploading $name…"
            existing=$(curl -fsS -H "$AUTH" "${API}/releases/${REL_ID}/assets" | jq -r --arg n "$name" '.[] | select(.name==$n) | .id' || true)
            if [ -n "$existing" ]; then
              curl -fsS -X DELETE -H "$AUTH" "${API}/releases/${REL_ID}/assets/${existing}"
            fi
            curl -fsS -X POST -H "$AUTH" -F "attachment=@${f}" "${API}/releases/${REL_ID}/assets?name=${name}" > /dev/null
          done
          echo "All assets uploaded to Codeberg release."
